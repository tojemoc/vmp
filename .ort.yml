# ORT repository configuration — see https://oss-review-toolkit.org/ort/docs/configuration
#
# CI runs ORT Analyzer + Scanner (ScanCode + SCANOSS) on every pull request.
# ScanCode covers dependency license/copyright headers; SCANOSS flags snippet
# matches against the public OSS knowledge base (first-party source and deps).

excludes:
  paths:
    - pattern: '**/.nuxt/**'
      reason: 'GENERATED'
    - pattern: '**/dist/**'
      reason: 'BUILD_TOOL_OF'
    - pattern: '**/.wrangler/**'
      reason: 'BUILD_TOOL_OF'
    - pattern: '**/coverage/**'
      reason: 'TEST_TOOL_OF'
  scopes:
    - pattern: 'devDependencies'
      reason: 'DEV_DEPENDENCY_OF'
      comment: 'Dev-only npm packages are not shipped to users.'
