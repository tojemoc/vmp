name: Dependabot Auto Merge

on:
  schedule:
    # 02:00 UTC daily (overnight in US timezones)
    - cron: '0 2 * * *'
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  dependabot-automerge:
    if: github.event_name == 'schedule' || github.event.pull_request.user.login == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge and rebase when needed
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            async function processPr(pr) {
              if (pr.user.login !== 'dependabot[bot]') return;
              if (pr.state !== 'open') return;

              core.info(`Processing #${pr.number}: ${pr.title}`);

              const fullPr = await github.rest.pulls.get({
                owner,
                repo,
                pull_number: pr.number,
              });

              const mergeableState = fullPr.data.mergeable_state;
              core.info(`#${pr.number} mergeable_state=${mergeableState}`);

              if (mergeableState === 'dirty' || mergeableState === 'behind') {
                try {
                  await github.rest.issues.createComment({
                    owner,
                    repo,
                    issue_number: pr.number,
                    body: '@dependabot rebase',
                  });
                  core.info(`Requested @dependabot rebase for #${pr.number}`);
                } catch (error) {
                  core.warning(`Failed to comment rebase on #${pr.number}: ${error.message}`);
                }
                return;
              }

              if (mergeableState === 'unknown') {
                core.info(`#${pr.number} mergeability still computing, skipping for now.`);
                return;
              }

              try {
                await github.graphql(
                  `mutation($pullRequestId: ID!) {
                    enablePullRequestAutoMerge(input: { pullRequestId: $pullRequestId, mergeMethod: SQUASH }) {
                      clientMutationId
                    }
                  }`,
                  { pullRequestId: fullPr.data.node_id },
                );
                core.info(`Enabled auto-merge for #${pr.number}`);
              } catch (error) {
                core.warning(`Unable to enable auto-merge for #${pr.number}: ${error.message}`);
              }
            }

            if (context.eventName === 'pull_request') {
              await processPr(context.payload.pull_request);
            } else {
              const prs = await github.paginate(github.rest.pulls.list, {
                owner,
                repo,
                state: 'open',
                per_page: 100,
              });

              for (const pr of prs) {
                await processPr(pr);
              }
            }
