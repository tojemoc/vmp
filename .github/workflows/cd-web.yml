name: CD - Web (Cloudflare Pages)

on:
  workflow_dispatch:
    inputs:
      target:
        description: Deploy target
        required: true
        type: choice
        options:
          - staging
          - production

concurrency:
  group: cd-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: read
    environment: ${{ inputs.target }}
    env:
      API_BASE_URL: ${{ inputs.target == 'production' && vars.API_URL_PROD || vars.API_URL_STAGING }}
      FRONTEND_URL: ${{ inputs.target == 'production' && vars.FRONTEND_URL_PROD || vars.FRONTEND_URL_STAGING }}
      EXPECTED_ALLOWED_ORIGINS: ${{ inputs.target == 'production' && vars.ALLOWED_ORIGINS_PROD || vars.ALLOWED_ORIGINS_STAGING }}
      PAGES_PROJECT_NAME: ${{ inputs.target == 'production' && vars.CF_PAGES_PROJECT_NAME_PROD || vars.CF_PAGES_PROJECT_NAME_STAGING }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build --workspace @vmp/web
        env:
          API_URL: ${{ env.API_BASE_URL }}

      - name: Validate env/domain wiring
        run: |
          test -n "$API_BASE_URL" || (echo "Missing API_URL_* environment variable" && exit 1)
          test -n "$FRONTEND_URL" || (echo "Missing FRONTEND_URL_* environment variable" && exit 1)
          test -n "$EXPECTED_ALLOWED_ORIGINS" || (echo "Missing ALLOWED_ORIGINS_* environment variable" && exit 1)
          test -n "$PAGES_PROJECT_NAME" || (echo "Missing CF_PAGES_PROJECT_NAME_* environment variable" && exit 1)
          echo "$EXPECTED_ALLOWED_ORIGINS" | rg "$FRONTEND_URL"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ inputs.target == 'production' && secrets.CLOUDFLARE_API_TOKEN_PROD || secrets.CLOUDFLARE_API_TOKEN_STAGING }}
          accountId: ${{ inputs.target == 'production' && secrets.CLOUDFLARE_ACCOUNT_ID_PROD || secrets.CLOUDFLARE_ACCOUNT_ID_STAGING }}
          workingDirectory: packages/web
          command: pages deploy dist/ --project-name ${{ env.PAGES_PROJECT_NAME }} --branch main

      - name: Smoke check frontend reachability
        run: |
          curl -fsS "$FRONTEND_URL" >/dev/null
