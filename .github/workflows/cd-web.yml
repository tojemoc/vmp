name: CD - Web (Cloudflare Pages)

on:
  push:
    branches:
      - main
    paths:
      - "packages/web/**"
      - "packages/shared/**"
      - ".github/workflows/cd-web.yml"
  workflow_dispatch:

concurrency:
  group: cd-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build --workspace @vmp/web

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: packages/web
          command: pages deploy dist/ --project-name ${{ secrets.CF_PAGES_PROJECT_NAME }} --branch main
