name: Media pipeline Docker

permissions:
  contents: read
  packages: write

on:
  push:
    branches:
      - main
    paths:
      - 'packages/media-pipeline/**'
      - 'packages/shared/**'
      - 'packages/storage/**'
      - 'package.json'
      - 'package-lock.json'
      - '.dockerignore'
      - '.github/workflows/media-pipeline-docker.yml'
  pull_request:
    paths:
      - 'packages/media-pipeline/**'
      - 'packages/shared/**'
      - 'packages/storage/**'
      - 'package.json'
      - 'package-lock.json'
      - '.dockerignore'
      - '.github/workflows/media-pipeline-docker.yml'
  workflow_dispatch:

concurrency:
  group: media-pipeline-docker-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/vmp-media-pipeline

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=
            type=ref,event=branch
            type=ref,event=pr

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/media-pipeline/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
