name: CodeRabbit Retry Worker

on:
  schedule:
    - cron: "*/5 * * * *"

  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write
concurrency:
  group: coderabbit-retry-worker
  cancel-in-progress: false
jobs:
  retry:
    runs-on: ubuntu-latest

    steps:
      - name: Find retry comments
        uses: actions/github-script@v7
        with:
          script: |
            const now = new Date()

            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              per_page: 100
            })

            for (const pr of prs) {
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                per_page: 100
              })

              const retryComment = comments.find(c =>
                c.body.includes("<!-- coderabbit-retry -->")
              )

              if (!retryComment) continue

              const match = retryComment.body.match(/retry_at=(.+)/)

              if (!match) continue

              const retryAt = new Date(match[1])

              if (retryAt > now) continue

              console.log(`Retrying PR #${pr.number}`)

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: "@coderabbitai review"
              })

              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: retryComment.id
              })
            }
