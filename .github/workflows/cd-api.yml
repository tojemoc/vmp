name: CD - API (Cloudflare Workers)

on:
  workflow_dispatch:
    inputs:
      target:
        description: Deploy target
        required: true
        type: choice
        options:
          - staging
          - production

concurrency:
  group: cd-api-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: read
    environment: ${{ inputs.target }}
    env:
      API_BASE_URL: ${{ inputs.target == 'production' && vars.API_URL_PROD || vars.API_URL_STAGING }}
      FRONTEND_URL: ${{ inputs.target == 'production' && vars.FRONTEND_URL_PROD || vars.FRONTEND_URL_STAGING }}
      EXPECTED_ALLOWED_ORIGINS: ${{ inputs.target == 'production' && vars.ALLOWED_ORIGINS_PROD || vars.ALLOWED_ORIGINS_STAGING }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Validate env/domain wiring
        run: |
          test -n "$API_BASE_URL" || (echo "Missing API_URL_* environment variable" && exit 1)
          test -n "$FRONTEND_URL" || (echo "Missing FRONTEND_URL_* environment variable" && exit 1)
          test -n "$EXPECTED_ALLOWED_ORIGINS" || (echo "Missing ALLOWED_ORIGINS_* environment variable" && exit 1)

      - name: Deploy Worker with Wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ inputs.target == 'production' && secrets.CLOUDFLARE_API_TOKEN_PROD || secrets.CLOUDFLARE_API_TOKEN_STAGING }}
          accountId: ${{ inputs.target == 'production' && secrets.CLOUDFLARE_ACCOUNT_ID_PROD || secrets.CLOUDFLARE_ACCOUNT_ID_STAGING }}
          workingDirectory: packages/api
          command: deploy

      - name: Smoke check API health
        run: |
          curl -fsS "$API_BASE_URL/api/health" | node -e 'const fs=require("node:fs");const body=JSON.parse(fs.readFileSync(0,"utf8"));if(body.status!=="healthy"){console.error("Unexpected /api/health payload",body);process.exit(1)}'

      - name: Smoke check API CORS origin
        run: |
          curl -sSI -H "Origin: $FRONTEND_URL" "$API_BASE_URL/api/health" | rg -i "^access-control-allow-origin: ${FRONTEND_URL}$"
          echo "$EXPECTED_ALLOWED_ORIGINS" | rg "$FRONTEND_URL"

      - name: Smoke check authenticated admin endpoint
        env:
          ADMIN_SMOKE_TOKEN: ${{ inputs.target == 'production' && secrets.PROD_ADMIN_SMOKE_TOKEN || secrets.STAGING_ADMIN_SMOKE_TOKEN }}
        run: |
          test -n "$ADMIN_SMOKE_TOKEN" || (echo "Missing admin smoke token secret" && exit 1)
          curl -fsS -H "Authorization: Bearer $ADMIN_SMOKE_TOKEN" "$API_BASE_URL/api/auth/me" | node -e 'const fs=require("node:fs");const body=JSON.parse(fs.readFileSync(0,"utf8"));if(!body?.user?.id||!["admin","super_admin"].includes(body?.user?.role)){console.error("Admin smoke check failed",body);process.exit(1)}'
