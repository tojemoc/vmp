name: CI

permissions:
  contents: read

env:
  NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.cursor/**'
      - '.agents/**'
      - '.opencode/**'
      - '.github/skills/**'
      - '.github/prompts/**'
      - '.github/agents/**'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          package-manager-cache: false

      - uses: nrwl/nx-set-shas@v4

      - name: Mount npm cache
        uses: useblacksmith/stickydisk@13af8883542ca949a717e70fef89d15edbb29d88
        with:
          key: ${{ github.repository }}-${{ runner.os }}-node22-npm-${{ hashFiles('**/package-lock.json') }}
          path: ~/.npm

      - name: Install dependencies (npm ci with npm install fallback)
        run: npm ci || npm install

      - name: Typecheck (affected)
        run: |
          bash .github/scripts/nx-with-cloud-fallback.sh affected -t typecheck typecheck:scripts --base=$NX_BASE --head=$NX_HEAD

      - run: bash .github/scripts/nx-with-cloud-fallback.sh fix-ci
        if: always()

  api-node:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          package-manager-cache: false

      - name: Mount npm cache
        uses: useblacksmith/stickydisk@13af8883542ca949a717e70fef89d15edbb29d88
        with:
          key: ${{ github.repository }}-${{ runner.os }}-node22-npm-${{ hashFiles('**/package-lock.json') }}
          path: ~/.npm

      - name: Install dependencies (npm ci with npm install fallback)
        run: npm ci || npm install

      - name: Verify api-node (typecheck, tests, esbuild bundle)
        run: npm run verify:api-node
