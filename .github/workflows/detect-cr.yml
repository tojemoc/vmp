name: Detect CodeRabbit Rate Limit

on:
  issue_comment:
    types: [created]
  workflow_dispatch: 

permissions:
  issues: write
  pull-requests: write

concurrency:
  group: coderabbit-retry-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  mark-retry:
    if: >
      github.event.issue.pull_request &&
      github.event.comment.user.login == 'coderabbitai[bot]' &&
      contains(github.event.comment.body, 'Rate limit exceeded')

    runs-on: ubuntu-latest

    steps:
      - name: Extract wait time
        id: extract
        shell: bash
        run: |
          BODY=$(cat <<'EOF'
          ${{ github.event.comment.body }}
          EOF
          )

          MINUTES=$(echo "$BODY" | grep -oP 'wait \*\*\K[0-9]+(?= minutes?)' || echo "0")
          SECONDS=$(echo "$BODY" | grep -oP 'and \K[0-9]+(?= seconds?)' || echo "0")

          TOTAL=$((MINUTES * 60 + SECONDS + 60))

          RETRY_AT=$(date -u -d "+$TOTAL seconds" +"%Y-%m-%dT%H:%M:%SZ")

          echo "Retry at: $RETRY_AT"

          echo "retry_at=$RETRY_AT" >> "$GITHUB_OUTPUT"

      - name: Check existing retry markers
        id: existing
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100
            })

            const retryComments = comments.filter(c =>
              c.body.includes("<!-- coderabbit-retry -->")
            )

            console.log(`Found ${retryComments.length} retry markers`)

            core.setOutput("count", retryComments.length)

      - name: Add retry marker comment
        if: steps.existing.outputs.count == '0'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.issue.number }}
          body: |
            <!-- coderabbit-retry -->
            retry_at=${{ steps.extract.outputs.retry_at }}
