name: Deploy
permissions:
  contents: read
env:
  NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}
on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      target:
        description: Deploy target
        required: true
        type: choice
        options:
          - staging
          - production

jobs:
  deploy-staging:
    if: (github.event_name == 'push' && startsWith(github.ref, 'refs/heads/main')) || (github.event_name == 'workflow_dispatch' && inputs.target == 'staging')
    runs-on: blacksmith-4vcpu-ubuntu-2404
    environment: staging
    env:
      API_BASE_URL: ${{ vars.API_URL_STAGING }}
      FRONTEND_URL: ${{ vars.FRONTEND_URL_STAGING }}
      EXPECTED_ALLOWED_ORIGINS: ${{ vars.ALLOWED_ORIGINS_STAGING }}
    steps:
      - uses: actions/checkout@v6
      
      - uses: actions/setup-node@v6
        with:
          node-version: 22
        # Remove cache: npm here if using stickydisk for ~/.npm below

      - name: Mount npm cache
        uses: useblacksmith/stickydisk@v1
        with:
          key: ${{ github.repository }}-${{ runner.os }}-node22-npm-${{ hashFiles('**/package-lock.json') }}
          path: ~/.npm
          
      - run: npm ci
      - name: Type check (fail fast)
        run: |
          npm exec nx -- run-many -t typecheck --projects=@vmp/shared,@vmp/api,@vmp/web
          npm exec nx -- run @vmp/web:typecheck:scripts
          npm exec nx -- run @vmp/web:build:sw-push
      
      - run: npm exec nx -- run @vmp/web:build
        env:
          API_URL: ${{ env.API_BASE_URL }}

      - name: Validate staging env/domain wiring
        run: |
          test -n "$API_BASE_URL" || (echo "Missing vars.API_URL_STAGING" && exit 1)
          test -n "$FRONTEND_URL" || (echo "Missing vars.FRONTEND_URL_STAGING" && exit 1)
          test -n "$EXPECTED_ALLOWED_ORIGINS" || (echo "Missing vars.ALLOWED_ORIGINS_STAGING" && exit 1)
      
      - name: Deploy API (staging)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_STAGING }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID_STAGING }}
        run: npm exec nx -- run @vmp/api:deploy
      
      - name: Deploy Web (staging)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_STAGING }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID_STAGING }}
        run: npm exec nx -- run wrangler pages deploy packages/web/dist --project-name ${{ vars.CF_PAGES_PROJECT_NAME_STAGING }} --branch main

      - name: Smoke check API health (staging)
        run: |
          curl -fsS "$API_BASE_URL/api/health" | node -e 'const fs=require("node:fs");const body=JSON.parse(fs.readFileSync(0,"utf8"));if(body.status!=="healthy"){console.error("Unexpected /api/health payload",body);process.exit(1)}'

      - name: Smoke check API CORS origin (staging)
        run: |
          headers="$(curl -fsSI -H "Origin: $FRONTEND_URL" "$API_BASE_URL/api/health" | tr -d '\r')"
          echo "$headers" | rg -i "^access-control-allow-origin: ${FRONTEND_URL}$"
          echo ",${EXPECTED_ALLOWED_ORIGINS}," | tr -d ' ' | rg -F ",${FRONTEND_URL},"

      - name: Smoke check deployment auth endpoint (staging)
        env:
          DEPLOY_SMOKE_AUTH_TOKEN: ${{ secrets.STAGING_DEPLOY_SMOKE_AUTH_TOKEN }}
        run: |
          if [ -z "$DEPLOY_SMOKE_AUTH_TOKEN" ]; then
            echo "Skipping deploy auth smoke check because secrets.STAGING_DEPLOY_SMOKE_AUTH_TOKEN is not configured."
            exit 0
          fi
          auth_status="$(curl -sS -o /tmp/smoke-auth-staging.json -w "%{http_code}" -H "X-Smoke-Token: $DEPLOY_SMOKE_AUTH_TOKEN" "$API_BASE_URL/api/admin/smoke-auth")"
          if [ "$auth_status" != "200" ]; then
            echo "Deploy auth smoke check failed with HTTP $auth_status"
            cat /tmp/smoke-auth-staging.json
            exit 1
          fi
          node -e 'const fs=require("node:fs");const body=JSON.parse(fs.readFileSync("/tmp/smoke-auth-staging.json","utf8"));if(body?.ok!==true){console.error("Deploy auth smoke response invalid",body);process.exit(1)}'

      - name: Smoke check frontend reachability (staging)
        run: |
          curl -fsS "$FRONTEND_URL" >/dev/null

  deploy-production:
    if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || (github.event_name == 'workflow_dispatch' && inputs.target == 'production')
    runs-on: blacksmith-4vcpu-ubuntu-2404
    environment: production
    env:
      API_BASE_URL: ${{ vars.API_URL_PROD }}
      FRONTEND_URL: ${{ vars.FRONTEND_URL_PROD }}
      EXPECTED_ALLOWED_ORIGINS: ${{ vars.ALLOWED_ORIGINS_PROD }}
    steps:
      - uses: actions/checkout@v6
      
      - uses: actions/setup-node@v6
        with:
          node-version: 22
        # Remove cache: npm here if using stickydisk for ~/.npm below

      - name: Mount npm cache
        uses: useblacksmith/stickydisk@v1
        with:
          key: ${{ github.repository }}-npm-cache
          path: ~/.npm
  
      - name: Mount node_modules
        uses: useblacksmith/stickydisk@v1
        with:
          key: ${{ github.repository }}-node-modules
          path: ./node_modules
          
      - run: npm ci
      - name: Type check (fail fast)
        run: |
          npm exec nx -- run-many -t typecheck --projects=@vmp/shared,@vmp/api,@vmp/web
          npm exec nx -- run @vmp/web:typecheck:scripts
          npm exec nx -- run @vmp/web:build:sw-push
      
      - run: npm exec nx -- run @vmp/web:build
        env:
          API_URL: ${{ env.API_BASE_URL }}

      - name: Validate production env/domain wiring
        run: |
          test -n "$API_BASE_URL" || (echo "Missing vars.API_URL_PROD" && exit 1)
          test -n "$FRONTEND_URL" || (echo "Missing vars.FRONTEND_URL_PROD" && exit 1)
          test -n "$EXPECTED_ALLOWED_ORIGINS" || (echo "Missing vars.ALLOWED_ORIGINS_PROD" && exit 1)
      
      - name: Deploy API (production)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_PROD }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID_PROD }}
        run: npm exec nx -- run @vmp/api:deploy
      
      - name: Deploy Web (production)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN_PROD }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID_PROD }}
          command: pages deploy packages/web/dist --project-name ${{ vars.CF_PAGES_PROJECT_NAME_PROD }} --branch main

      - name: Smoke check API health (production)
        run: |
          curl -fsS "$API_BASE_URL/api/health" | node -e 'const fs=require("node:fs");const body=JSON.parse(fs.readFileSync(0,"utf8"));if(body.status!=="healthy"){console.error("Unexpected /api/health payload",body);process.exit(1)}'

      - name: Smoke check API CORS origin (production)
        run: |
          headers="$(curl -fsSI -H "Origin: $FRONTEND_URL" "$API_BASE_URL/api/health" | tr -d '\r')"
          echo "$headers" | rg -i "^access-control-allow-origin: ${FRONTEND_URL}$"
          echo ",${EXPECTED_ALLOWED_ORIGINS}," | tr -d ' ' | rg -F ",${FRONTEND_URL},"

      - name: Smoke check deployment auth endpoint (production)
        env:
          DEPLOY_SMOKE_AUTH_TOKEN: ${{ secrets.PROD_DEPLOY_SMOKE_AUTH_TOKEN }}
        run: |
          if [ -z "$DEPLOY_SMOKE_AUTH_TOKEN" ]; then
            echo "Skipping deploy auth smoke check because secrets.PROD_DEPLOY_SMOKE_AUTH_TOKEN is not configured."
            exit 0
          fi
          auth_status="$(curl -sS -o /tmp/smoke-auth-production.json -w "%{http_code}" -H "X-Smoke-Token: $DEPLOY_SMOKE_AUTH_TOKEN" "$API_BASE_URL/api/admin/smoke-auth")"
          if [ "$auth_status" != "200" ]; then
            echo "Deploy auth smoke check failed with HTTP $auth_status"
            cat /tmp/smoke-auth-production.json
            exit 1
          fi
          node -e 'const fs=require("node:fs");const body=JSON.parse(fs.readFileSync("/tmp/smoke-auth-production.json","utf8"));if(body?.ok!==true){console.error("Deploy auth smoke response invalid",body);process.exit(1)}'

      - name: Smoke check frontend reachability (production)
        run: |
          curl -fsS "$FRONTEND_URL" >/dev/null

      - run: npx nx fix-ci
        if: always()
