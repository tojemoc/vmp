name: Deploy
permissions:
  contents: read

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  deploy-staging:
    if: startsWith(github.ref, 'refs/heads/main')
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
  
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          # Remove cache: npm here if using stickydisk for ~/.npm below
  
      - name: Mount npm cache
        uses: useblacksmith/stickydisk@v1
        with:
          key: ${{ github.repository }}-npm-cache
          path: ~/.npm
  
      - name: Mount node_modules
        uses: useblacksmith/stickydisk@v1
        with:
          key: ${{ github.repository }}-node-modules
          path: ./node_modules
  
      - run: npm ci
  
      - name: Cache Nuxt build
        uses: useblacksmith/cache@v5
        with:
          path: packages/web/.nuxt
          key: ${{ runner.os }}-nuxt-${{ hashFiles('packages/web/**/*.{ts,vue,js,json}') }}
          restore-keys: |
            ${{ runner.os }}-nuxt-
  
      - run: npm run build --workspace=@vmp/web
        env:
          API_URL: https://api-staging.example.com
  
      - name: Deploy API (staging)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_STAGING }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID_STAGING }}
        run: npm run deploy --workspace=@vmp/api
  
      - name: Deploy Web (staging)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_STAGING }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID_STAGING }}
        run: npx wrangler pages deploy packages/web/dist --project-name ${{ secrets.CF_PAGES_PROJECT_NAME }} --branch main
  deploy-production:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build --workspace=@vmp/web
        env:
          API_URL: https://api.example.com
      - name: Deploy API (production)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_PROD }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID_PROD }}
        run: npm run deploy --workspace=@vmp/api
      - name: Deploy Web (production)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_PROD }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID_PROD }}
        run: npx wrangler pages deploy packages/web/dist --project-name vmp-web
