name: Deploy
permissions:
  contents: read
# Deploy does not use Nx Cloud — avoids a 500-credit CIPE per main/tag push.
# PR CI (ci.yml) keeps Nx Cloud for remote cache and self-healing.
on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      target:
        description: Deploy target
        required: true
        type: choice
        options:
          - staging
          - production

concurrency:
  group: deploy-${{ github.workflow }}-${{ github.ref }}-${{ github.event_name == 'workflow_dispatch' && inputs.target || 'push' }}
  cancel-in-progress: false

jobs:
  deploy-staging:
    if: (github.event_name == 'push' && startsWith(github.ref, 'refs/heads/main')) || (github.event_name == 'workflow_dispatch' && inputs.target == 'staging')
    runs-on: blacksmith-4vcpu-ubuntu-2404
    environment: staging
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: lts/*
          package-manager-cache: false

      - name: Mount npm cache
        uses: useblacksmith/stickydisk@13af8883542ca949a717e70fef89d15edbb29d88
        with:
          key: ${{ github.repository }}-${{ runner.os }}-node-lts-npm-${{ hashFiles('**/package-lock.json') }}
          path: ~/.npm

      - name: Deploy staging Cloudflare API and Web
        uses: ./.github/actions/deploy-cloudflare
        with:
          deploy-tier: staging
          api-base-url: ${{ vars.API_URL_STAGING }}
          frontend-url: ${{ vars.FRONTEND_URL_STAGING }}
          expected-allowed-origins: ${{ vars.ALLOWED_ORIGINS_STAGING }}
          cloudflare-api-token: ${{ secrets.CLOUDFLARE_API_TOKEN_STAGING }}
          cloudflare-account-id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID_STAGING }}
          deploy-smoke-auth-token: ${{ secrets.STAGING_DEPLOY_SMOKE_AUTH_TOKEN }}
          web-deploy-args: --config wrangler.workers.toml
          git-sha: ${{ github.sha }}
          ui-locale: ${{ vars.NUXT_PUBLIC_UI_LOCALE }}
          sentry-dsn: ${{ vars.NUXT_PUBLIC_SENTRY_DSN }}
          sentry-auth-token: ${{ secrets.SENTRY_AUTH_TOKEN }}

  deploy-api-node-backup:
    if: (github.event_name == 'push' && startsWith(github.ref, 'refs/heads/main')) || (github.event_name == 'workflow_dispatch' && inputs.target == 'staging')
    needs: deploy-staging
    runs-on: blacksmith-4vcpu-ubuntu-2404
    environment: staging
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: lts/*
          package-manager-cache: false

      - name: Mount npm cache
        uses: useblacksmith/stickydisk@13af8883542ca949a717e70fef89d15edbb29d88
        with:
          key: ${{ github.repository }}-${{ runner.os }}-node-lts-npm-${{ hashFiles('**/package-lock.json') }}
          path: ~/.npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Deno Deploy configuration
        env:
          DENO_DEPLOY_TOKEN: ${{ secrets.DENO_DEPLOY_TOKEN }}
          DENO_DEPLOY_ORG: ${{ vars.DENO_DEPLOY_ORG }}
          DENO_DEPLOY_APP: ${{ vars.DENO_DEPLOY_APP }}
          BACKUP_API_URL: ${{ vars.API_URL_BACKUP }}
        run: |
          if [ -z "$DENO_DEPLOY_TOKEN" ]; then
            echo "DENO_DEPLOY_TOKEN is not configured; backup API upload and smoke checks will be skipped."
            exit 0
          fi
          test -n "$DENO_DEPLOY_ORG" || (echo "Missing vars.DENO_DEPLOY_ORG" && exit 1)
          test -n "$DENO_DEPLOY_APP" || (echo "Missing vars.DENO_DEPLOY_APP" && exit 1)
          test -n "$BACKUP_API_URL" || (echo "Missing vars.API_URL_BACKUP" && exit 1)
          echo "Deno Deploy org: $DENO_DEPLOY_ORG"
          echo "Deno Deploy app: $DENO_DEPLOY_APP"
          echo "Backup API URL: $BACKUP_API_URL"

      - name: Verify api-node before upload (required — deploy aborts if this fails)
        run: npm run verify:api-node

      - name: Build Deno Deploy upload bundle
        working-directory: packages/api-node
        run: |
          # api-node now bundles pure-JS runtime dependencies with esbuild, so the upload
          # artifact comes directly from the already-installed monorepo workspace.  The
          # former second package-local npm install/prune existed to put production
          # node_modules under packages/api-node for Deno Deploy; it is no longer needed.
          npm run build
          test -f dist/server.js

      - uses: denoland/setup-deno@e95548e56dfa95d4e1a28d6f422fafe75c4c26fb
        with:
          deno-version: v2.x
      
      - name: Deploy api-node to Deno Deploy
        working-directory: packages/api-node
        env:
          DENO_DEPLOY_TOKEN: ${{ secrets.DENO_DEPLOY_TOKEN }}
          DENO_DEPLOY_ORG: ${{ vars.DENO_DEPLOY_ORG }}
          DENO_DEPLOY_APP: ${{ vars.DENO_DEPLOY_APP }}
        run: |
          if [ -z "$DENO_DEPLOY_TOKEN" ]; then
            echo "Skipping Deno Deploy upload — configure DENO_DEPLOY_TOKEN to enable backup API deploy."
            exit 0
          fi
      
          node scripts/deno-deploy-upload.mjs
      
      - name: Smoke check backup API (Deno Deploy)
        env:
          DENO_DEPLOY_TOKEN: ${{ secrets.DENO_DEPLOY_TOKEN }}
          BACKUP_API_URL: ${{ vars.API_URL_BACKUP }}
        run: |
          if [ -z "$DENO_DEPLOY_TOKEN" ]; then
            echo "Skipping backup API smoke — DENO_DEPLOY_TOKEN not configured."
            exit 0
          fi
      
          bash .github/scripts/smoke-api-node-backup.sh "$BACKUP_API_URL"

  deploy-production:
    if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || (github.event_name == 'workflow_dispatch' && inputs.target == 'production')
    runs-on: blacksmith-4vcpu-ubuntu-2404
    environment: production
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: lts/*
          package-manager-cache: false

      - name: Mount npm cache
        uses: useblacksmith/stickydisk@13af8883542ca949a717e70fef89d15edbb29d88
        with:
          key: ${{ github.repository }}-${{ runner.os }}-node-lts-npm-${{ hashFiles('**/package-lock.json') }}
          path: ~/.npm

      - name: Deploy production Cloudflare API and Web
        uses: ./.github/actions/deploy-cloudflare
        with:
          deploy-tier: production
          api-base-url: ${{ vars.API_URL_PROD }}
          frontend-url: ${{ vars.FRONTEND_URL_PROD }}
          expected-allowed-origins: ${{ vars.ALLOWED_ORIGINS_PROD }}
          cloudflare-api-token: ${{ secrets.CLOUDFLARE_API_TOKEN_PROD }}
          cloudflare-account-id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID_PROD }}
          deploy-smoke-auth-token: ${{ secrets.PROD_DEPLOY_SMOKE_AUTH_TOKEN }}
          web-deploy-args: --config wrangler.workers.toml --env production
          git-sha: ${{ github.sha }}
          app-version: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
          ui-locale: ${{ vars.NUXT_PUBLIC_UI_LOCALE }}
          sentry-dsn: ${{ vars.NUXT_PUBLIC_SENTRY_DSN }}
          sentry-auth-token: ${{ secrets.SENTRY_AUTH_TOKEN }}
