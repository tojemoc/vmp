name: CD - Video Processor Admin (Cloudflare Pages)

on:
  workflow_dispatch:

concurrency:
  group: cd-video-processor-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 25

      - name: Install dependencies
        run: npm install

      - name: Deploy video processor admin to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: packages/video-processor
          command: pages deploy public --project-name ${{ secrets.CF_PAGES_VIDEO_PROCESSOR_PROJECT_NAME }} --branch main
