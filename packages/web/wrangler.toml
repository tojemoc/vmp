# Experimental Cloudflare Workers frontend (parallel to Pages).
# Pages remains primary — see scripts/deploy-pages.mjs and `npm run build` (cloudflare_pages).
#
# Deploy: npm run build:workers && npm run deploy:workers
# CI: .github/workflows/deploy-web-workers.yml

name = "vmp-web-worker-dev"
main = ".output/server/index.mjs"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = ".output/public"
binding = "ASSETS"

[observability]
enabled = true

# Production Worker (deploy explicitly: npm run deploy:workers:prod).
[env.production]
name = "vmp-web-worker-prod"

# Runtime vars (Workers). Nuxt `runtimeConfig.public` values are baked at build time — see docs/workers-deploy-env.md.
[vars]
# NUXT_PUBLIC_* are not read here unless you add server-side runtimeConfig without public prefix.
