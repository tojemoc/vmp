# Cloudflare Workers frontend (Nuxt SSR + static assets).
# Deploy: npm run build && npm run deploy  (staging — vmp-web-worker-dev)
#         npm run build && npm run deploy:prod  (production — vmp-web-worker-prod)
# CI: .github/workflows/deploy.yml

name = "vmp-web-worker-dev"
main = ".output/server/index.mjs"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = ".output/public"
binding = "ASSETS"

[observability]
enabled = true

[env.production]
name = "vmp-web-worker-prod"

[vars]
# NUXT_PUBLIC_* are baked at build time; no runtime Worker vars required today.
