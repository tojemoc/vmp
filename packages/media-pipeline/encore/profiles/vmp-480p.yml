name: vmp-480p
description: VMP phase-2 — 480p H.264 video-only
scaling: bicubic
encodes:
  - type: X264Encode
    suffix: _480p
    height: 480
    twoPass: false
    params:
      b:v: 1500k
      maxrate: 1500k
      bufsize: 3000k
      r: 30
      fps_mode: cfr
      pix_fmt: yuv420p
      g: 180
      keyint_min: 180
      sc_threshold: 0
      profile:v: main
