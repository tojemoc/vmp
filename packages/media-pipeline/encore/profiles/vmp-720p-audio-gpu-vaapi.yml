name: vmp-720p-audio-gpu-vaapi
description: VMP fast-lane 720p via VAAPI (Encore worker needs /dev/dri + h264_vaapi FFmpeg)
scaling: bicubic
encodes:
  - type: X264Encode
    suffix: _720p
    height: 720
    twoPass: false
    videoFilter: format=nv12,hwupload
    params:
      c:v: h264_vaapi
      b:v: 3000k
      maxrate: 3000k
      bufsize: 6000k
      r: 30
      fps_mode: cfr
      g: 180
      keyint_min: 180
      sc_threshold: 0
    audioEncode:
      type: AudioEncode
      bitrate: 128k
