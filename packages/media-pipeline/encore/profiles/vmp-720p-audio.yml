name: vmp-720p-audio
description: VMP phase-1 ladder rung — 720p H.264 + stereo AAC (matches legacy podcast-host 720p renditions)
scaling: bicubic
encodes:
  - type: X264Encode
    suffix: _720p
    height: 720
    twoPass: false
    params:
      b:v: 3000k
      maxrate: 3000k
      bufsize: 6000k
      r: 30
      fps_mode: cfr
      pix_fmt: yuv420p
      g: 180
      keyint_min: 180
      sc_threshold: 0
      profile:v: high
    audioEncode:
      type: AudioEncode
      bitrate: 128k
