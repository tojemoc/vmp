# Optional NVIDIA GPU override for encore-web.
# Usage: docker compose -f encore/docker-compose.yml -f encore/docker-compose.nvidia.yml up -d
#
# If you also use docker-compose.workers.yml, add the same reservations to encore-worker.

services:
  encore-web:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
