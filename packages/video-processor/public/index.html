<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Video Processor Admin</title>
    <style>
      :root { font-family: Inter, system-ui, sans-serif; color-scheme: light dark; }
      body { margin: 0; padding: 2rem; background: #111827; color: #f3f4f6; }
      .container { max-width: 900px; margin: 0 auto; }
      .card { background: #1f2937; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 1rem; }
      h1, h2 { margin: 0 0 0.75rem 0; }
      .dropzone {
        border: 2px dashed #6b7280; border-radius: 12px; padding: 2rem; text-align: center;
        transition: border-color .2s, background .2s; cursor: pointer;
      }
      .dropzone.drag { border-color: #60a5fa; background: rgba(96, 165, 250, .15); }
      .controls { display: flex; gap: .75rem; flex-wrap: wrap; align-items: center; margin-top: 1rem; }
      select, button, input { padding: .55rem .75rem; border-radius: 8px; border: 1px solid #4b5563; background: #111827; color: #f9fafb; }
      button { background: #2563eb; border: none; cursor: pointer; }
      button:disabled { background: #374151; cursor: not-allowed; }
      .muted { color: #9ca3af; font-size: .9rem; }
      .status { margin-top: .75rem; min-height: 1.5rem; white-space: pre-line; }
      table { width: 100%; border-collapse: collapse; margin-top: .5rem; }
      th, td { border-bottom: 1px solid #374151; padding: .55rem; text-align: left; font-size: .92rem; }
      .pill { padding: .15rem .5rem; border-radius: 999px; background: #374151; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/tus-js-client@4/dist/tus.min.js"></script>
  </head>
  <body>
    <div class="container">
      <h1>Video Processor Admin</h1>
      <p class="muted">Drag/drop videos, upload to R2 with tus resumable uploads, then trigger processing and apply visibility tags.</p>

      <section class="card">
        <h2>Upload</h2>
        <div id="dropzone" class="dropzone">Drop video file here or click to choose</div>
        <input id="fileInput" type="file" accept="video/*" hidden />

        <div class="controls">
          <label>Visibility:
            <select id="visibility">
              <option value="private">private</option>
              <option value="unlisted">unlisted</option>
              <option value="public">public</option>
            </select>
          </label>
          <button id="uploadBtn" disabled>Upload with tus</button>
          <button id="processBtn" disabled>Process Video</button>
        </div>
        <div id="uploadStatus" class="status muted"></div>
      </section>

      <section class="card">
        <h2>Videos (uploaded + processed)</h2>
        <button id="refreshBtn">Refresh list</button>
        <table>
          <thead>
            <tr><th>Video ID</th><th>Status</th><th>Visibility</th><th>Updated</th></tr>
          </thead>
          <tbody id="videosBody"></tbody>
        </table>
      </section>
    </div>

    <script>
      const dropzone = document.getElementById('dropzone');
      const fileInput = document.getElementById('fileInput');
      const uploadBtn = document.getElementById('uploadBtn');
      const processBtn = document.getElementById('processBtn');
      const refreshBtn = document.getElementById('refreshBtn');
      const visibility = document.getElementById('visibility');
      const uploadStatus = document.getElementById('uploadStatus');
      const videosBody = document.getElementById('videosBody');

      let selectedFile = null;
      let uploadedVideoId = null;

      const setStatus = (message) => uploadStatus.textContent = message;

      const setFile = (file) => {
        selectedFile = file;
        uploadedVideoId = null;
        uploadBtn.disabled = !file;
        processBtn.disabled = true;
        dropzone.textContent = file ? `Selected: ${file.name} (${Math.round(file.size / 1024 / 1024)} MB)` : 'Drop video file here or click to choose';
      };

      dropzone.addEventListener('click', () => fileInput.click());
      fileInput.addEventListener('change', () => setFile(fileInput.files[0]));
      dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.classList.add('drag'); });
      dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag'));
      dropzone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropzone.classList.remove('drag');
        if (e.dataTransfer.files.length > 0) setFile(e.dataTransfer.files[0]);
      });

      uploadBtn.addEventListener('click', async () => {
        if (!selectedFile) return;
        uploadBtn.disabled = true;
        processBtn.disabled = true;
        setStatus('Starting tus upload...');

        const upload = new tus.Upload(selectedFile, {
          endpoint: '/api/uploads',
          chunkSize: 8 * 1024 * 1024,
          retryDelays: [0, 1000, 3000, 5000],
          metadata: {
            filename: selectedFile.name,
            filetype: selectedFile.type,
            visibility: visibility.value
          },
          onError: (error) => {
            setStatus(`Upload failed: ${error?.message || 'unknown error'}`);
            uploadBtn.disabled = false;
          },
          onProgress: (uploaded, total) => {
            const percent = ((uploaded / total) * 100).toFixed(1);
            setStatus(`Uploading via tus... ${percent}% (${Math.round(uploaded / 1024 / 1024)} / ${Math.round(total / 1024 / 1024)} MB)`);
          },
          onSuccess: () => {
            const uploadUrl = upload.url || '';
            uploadedVideoId = uploadUrl.split('/').pop();
            setStatus(`Tus upload complete. videoId: ${uploadedVideoId}`);
            processBtn.disabled = !uploadedVideoId;
          }
        });

        const previousUploads = await upload.findPreviousUploads();
        if (previousUploads.length > 0) {
          upload.resumeFromPreviousUpload(previousUploads[0]);
          setStatus('Resuming previous tus upload...');
        }

        upload.start();
      });

      processBtn.addEventListener('click', async () => {
        if (!uploadedVideoId) return;
        processBtn.disabled = true;
        setStatus('Processing video in Cloudflare environment...');

        const res = await fetch('/api/process', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ videoId: uploadedVideoId, visibility: visibility.value })
        });

        const data = await safeJson(res);
        if (!res.ok) {
          setStatus(`Processing failed: ${data.error || data.rawText || 'unknown error'}`);
          processBtn.disabled = false;
          return;
        }

        setStatus(`Processed ${uploadedVideoId}. Playlist key: ${data.playlistKey}`);
        await loadVideos();
      });

      async function loadVideos() {
        videosBody.innerHTML = '<tr><td colspan="4">Loading…</td></tr>';
        const res = await fetch('/api/videos');
        const data = await res.json();

        if (!res.ok) {
          videosBody.innerHTML = `<tr><td colspan="4">${data.error || 'Unable to load'}</td></tr>`;
          return;
        }

        if (!data.videos.length) {
          videosBody.innerHTML = '<tr><td colspan="4">No videos yet.</td></tr>';
          return;
        }

        videosBody.innerHTML = data.videos.map((video) => `
          <tr>
            <td><code>${video.videoId}</code></td>
            <td><span class="pill">${video.status}</span></td>
            <td>${video.visibility}</td>
            <td>${new Date(video.updatedAt).toLocaleString()}</td>
          </tr>
        `).join('');
      }

      refreshBtn.addEventListener('click', loadVideos);
      loadVideos();

      async function safeJson(response) {
        const text = await response.text();
        try {
          return JSON.parse(text);
        } catch {
          return { rawText: text };
        }
      }
    </script>
  </body>
</html>
